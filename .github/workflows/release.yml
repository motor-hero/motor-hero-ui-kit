name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Gerar changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          RANGE="${PREV:+$PREV..}${TAG}"
          LOG=$(git log $RANGE --no-merges --pretty='%s (%h)')
          emit() {
            local items
            items=$(printf '%s\n' "$LOG" | grep -E "$2" | sed -E 's/^[a-z]+(\(.+\))?!?: //' || true)
            if [ -n "$items" ]; then
              echo "### $1"
              printf '%s\n' "$items" | sed 's/^/- /'
              echo
            fi
          }
          {
            emit "🚀 Features" '^feat'
            emit "🐛 Fixes"    '^fix'
            emit "📚 Docs"     '^docs'
            emit "🔧 Outros"   '^(chore|refactor|perf|style|test|build|ci)'
          } > notes.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md

      - name: Notificar Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL não configurado — pulando notificação."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          TEXT="📦 *@motor-hero/ui-kit* \`${VERSION}\` publicado no npm — <${RELEASE_URL}|release notes>"
          curl -fsS -X POST --data-urlencode \
            "payload={\"channel\": \"#deploy\", \"username\": \"motor-hero-ui-kit\", \"text\": \"${TEXT}\", \"icon_emoji\": \":package:\"}" \
            "$SLACK_WEBHOOK_URL"
